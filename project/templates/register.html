<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up - School Zone Traffic Monitoring</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* BODY FIX (IMPORTANT FOR SCROLL) */
body{
  min-height:100vh;
  color:#2d3748;

  display:flex;
  justify-content:center;
  align-items:flex-start;   /* changed from center */
  padding:60px 20px;        /* allows scroll space */

  /* MATCHING BACKGROUND LIGHT MODE */
  background-color:#f7fafc;
  background-image: 
    linear-gradient(135deg, rgba(255, 255, 255, 0.90) 0%, rgba(240, 244, 248, 0.95) 100%),
    url('https://images.unsplash.com/photo-1502877338535-766e1452684a?q=80&w=1974&auto=format&fit=crop');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  overflow-y:auto;   /* IMPORTANT */
}

/* OVERLAY */
body::before{
  content:'';
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background: linear-gradient(135deg, rgba(26, 54, 93, 0.02), rgba(221, 107, 32, 0.02));

  z-index:-1;
}

/* REGISTER BOX */
.register-box{
  width:100%;
  max-width:480px;

  background:rgba(255, 255, 255, 0.95);

  padding:35px;

  border-radius:16px;

  backdrop-filter:blur(5px);

  border:1px solid rgba(255, 255, 255, 0.8);

  box-shadow:0 10px 30px rgba(0, 0, 0, 0.06);
}

/* TITLE */
.register-box h1{
  text-align:center;
  margin-bottom:25px;
  color:#1a365d;
  font-size:28px;
  font-weight:700;
}

/* INPUT */
.input-group{
  margin-bottom:16px;
}

.input-group label{
  display:block;
  margin-bottom:6px;
  color:#4a5568;
  font-size:14px;
  font-weight:600;
}

.input-group input,
.input-group select{
  width:100%;
  padding:13px;
  border:1px solid #cbd5e0;
  border-radius:8px;

  background:#ffffff;
  color:#2d3748;
  outline:none;
  transition:0.3s;
}

.input-group input:focus,
.input-group select:focus{
  border:1px solid #dd6b20;
  box-shadow:0 0 10px rgba(221,107,32,0.15);
}

/* BUTTON */
.signup-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;

  background:#dd6b20;
  color:white;

  font-size:16px;
  font-weight:bold;
  cursor:pointer;

  margin-top:10px;
  box-shadow:0 4px 12px rgba(221, 107, 32, 0.2);
  transition:0.3s;
}

.signup-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(0, 0, 0, 0.15);
  opacity:0.95;
}

/* BOTTOM */
.bottom-text{
  text-align:center;
  margin-top:18px;
  color:#718096;
  font-weight:500;
}

.bottom-text a{
  color:#2b6cb0;
  text-decoration:none;
  font-weight:600;
}

.bottom-text a:hover{
  text-decoration:underline;
}

/* MOBILE */
@media(max-width:500px){
  .register-box{
    padding:25px;
  }
}

</style>
</head>

<body>

<div class="register-box">

  <h1>
    <i class="fa fa-user-plus"></i>
    Create Account
  </h1>

  <form method="POST" action="/register">

    <div class="input-group">
      <label>Full Name</label>
      <input type="text" name="fullname" required>
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>

    <div class="input-group">
      <label>Phone</label>
      <input type="text" name="phone" required>
    </div>

    <div class="input-group">
      <label>Role</label>
      <select name="role" required>
        <option value="Traffic Police">Traffic Police</option>
        <option value="Viewer">Viewer</option>
      </select>
    </div>

    <div class="input-group">
      <label>Username</label>
      <input type="text" name="username" required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>

    <button type="submit" class="signup-btn">
      <i class="fa fa-user-plus"></i> Create Account
    </button>

  </form>

  <div class="bottom-text">
    Already have an account?
    <a href="{{ url_for('login') }}">Login</a>
  </div>

</div>

</body>
</html>
