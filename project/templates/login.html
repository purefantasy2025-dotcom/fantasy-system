<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - School Zone Traffic Monitoring</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #07152d; /* Hii ni background ya giza kama index.html */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: #021024; /* Rangi ya giza inayofanana na Sidebar */
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #13284d;
        }

        h2 { 
            color: #0d6efd; 
            margin-bottom: 25px; 
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #d8e3f5;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #13284d;
            color: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0d6efd;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #0b5ed7;
        }

        .error-msg {
            color: #ff4d4d;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .back-home {
            margin-top: 20px;
            display: block;
            color: #888;
            text-decoration: none;
            font-size: 13px;
        }

        .back-home:hover {
            color: #0d6efd;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2><i class="fa fa-traffic-light"></i> System Login</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <p class="error-msg">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            
            <div class="input-group">
                <label>User Role</label>
                <select name="role" required>
                    <option value="admin">Administrator</option>
                    <option value="traffic">Traffic Officer</option>
                    <option value="user">Standard User</option>
                </select>
            </div>

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit">
                <i class="fa fa-right-to-bracket"></i> Login
            </button>
        </form>

        <a href="{{ url_for('index') }}" class="back-home">Back to Homepage</a>
    </div>

</body>
</html>
