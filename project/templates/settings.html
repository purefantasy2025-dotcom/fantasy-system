<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings Page</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}
    body{background:#07152d;color:white;display:flex;}
    .sidebar{width:260px;height:100vh;background:#021024;padding:20px;position:fixed;left:0;top:0;}
    .logo{font-size:24px;font-weight:bold;margin-bottom:40px;}
    .menu{list-style:none;}
    .menu li{margin:15px 0;}
    .menu li a{text-decoration:none;color:white;padding:14px;display:block;border-radius:10px;transition:0.3s;}
    .menu li a:hover, .active{background:#0d6efd;}
    .menu li a i{margin-right:10px;}
    .main{margin-left:260px;width:100%;padding:20px;}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
    .topbar h1{font-size:30px;}
    .profile{background:#0d6efd;padding:10px 18px;border-radius:30px;}
    .settings-container{display:grid;grid-template-columns:repeat(2,1fr);gap:25px;}
    .settings-card{background:#0d1b36;padding:25px;border-radius:15px;}
    .settings-card h2{margin-bottom:20px;font-size:24px;}
    .input-group{margin-bottom:20px;}
    .input-group label{display:block;margin-bottom:8px;color:#cdd7ea;}
    .input-group input, .input-group select{width:100%;padding:12px;border:none;border-radius:8px;background:#13284d;color:white;}
    .toggle{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;background:#13284d;padding:15px;border-radius:10px;}
    .switch{width:50px;height:25px;background:#0d6efd;border-radius:30px;position:relative;cursor:pointer;}
    .switch::before{content:'';width:20px;height:20px;background:white;border-radius:50%;position:absolute;top:2.5px;left:26px;}
    .save-btn{margin-top:15px;padding:14px 20px;background:#0d6efd;color:white;border:none;border-radius:10px;cursor:pointer;width:100%;font-size:16px;}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">🚦 Traffic Monitor</div>
    <ul class="menu">
  <li><a href="{{ url_for('dashboard') }}"><i class="fa fa-home"></i> Dashboard</a></li>
  <li><a href="{{ url_for('users') }}"><i class="fa fa-users"></i> Users</a></li>
  <li><a href="{{ url_for('reports') }}"><i class="fa fa-file-lines"></i> Reports</a></li>
  <li><a href="{{ url_for('settings') }}"><i class="fa fa-gear\"></i> Settings</a></li>
  <li><a href="{{ url_for('logout') }}"><i class="fa fa-right-from-bracket\"></i> Logout</a></li>
</ul>
  </div>
  <div class="main">
    <div class="topbar">
      <h1>System Settings</h1>
      <div class="profile"><i class="fa fa-user"></i> Admin</div>
    </div>
    <div class="settings-container">
      <div class="settings-card">
        <h2>Sensor Configuration</h2>
        <div class="input-group"><label>Threshold Speed (km/h)</label><input type="number" value="40"></div>
        <div class="input-group"><label>Location</label><input type="text" value="School Gate A"></div>
        <button class="save-btn">Update Sensor</button>
      </div>
      <div class="settings-card">
        <h2>Alert Settings</h2>
        <div class="toggle"><span>Email Notifications</span><div class="switch"></div></div>
        <div class="toggle"><span>SMS Alerts</span><div class="switch"></div></div>
        <button class="save-btn">Save Alert Settings</button>
      </div>
    </div>
  </div>
</body>
</html>
